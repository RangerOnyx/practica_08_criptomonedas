name: cryptocurrency_update

env:
  AUTOMATION_USERNAME: "RangerOnyx"
  AUTOMATION_EMAIL: "remolachacontenta@gmail.com"

on:
  push:

permissions:
  contents: write

jobs:
  autoscrape:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@master
    - uses: r-lib/actions/setup-r@v2
      with:
        r-version: '4.x.x'
    - name: Install packages
      run: |
        R -e 'install.packages("dplyr")'
        R -e 'install.packages("chromote")'
        R -e 'install.packages("rvest")'
    - name: scrap
      run: Rscript criptocurrency_values.R
    - name: Commit files
      run: |
        git config --local user.name "$AUTOMATION_USERNAME"
        git config --local user.email "$AUTOMATION_EMAIL"
        git add data/*
        git commit -am "gh actions: Update cripto values $(date)"
        git push origin main
